<style>
  :root, [data-theme="dark"] {
    --bg: #14110d;
    --surface: #1d1812;
    --surface-2: #261f17;
    --surface-3: #2f261c;
    --line: #3a2f23;
    --line-soft: #2a221a;
    --cream: #f4ede0;
    --cream-dim: #c8bfae;
    --muted: #8a7f6e;
    --amber: #d4a056;
    --amber-bright: #e8b566;
    --cognac: #b87333;
    --green: #7a9a4d;
    --red: #b8553a;
    --shadow: 0 20px 60px -20px rgba(0,0,0,0.6);

    /* === DESIGN TOKENS — Espacements (système 4-points) === */
    --space-1: 4px;
    --space-2: 8px;
    --space-3: 12px;
    --space-4: 16px;
    --space-5: 20px;
    --space-6: 24px;
    --space-8: 32px;
    --space-10: 40px;
    --space-12: 48px;

    /* === Rayons === */
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
    --radius-xl: 20px;
    --radius-full: 9999px;

    /* === Ombres mobile === */
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.25);
    --shadow-lg: 0 8px 24px rgba(0,0,0,0.35);
    --shadow-fab: 0 8px 24px rgba(212,160,86,0.35), 0 2px 8px rgba(0,0,0,0.4);
    --shadow-sheet: 0 -12px 40px rgba(0,0,0,0.5);

    /* === Tailles tactiles === */
    --tap-min: 44px;
    --tap-comfort: 48px;
    --tap-large: 56px;

    /* === Animations === */
    --ease-spring: cubic-bezier(0.32, 0.72, 0, 1);
    --ease-out: cubic-bezier(0.4, 0, 0.2, 1);
    --ease-in: cubic-bezier(0.4, 0, 1, 1);
    --duration-fast: 150ms;
    --duration-normal: 250ms;
    --duration-slow: 400ms;
